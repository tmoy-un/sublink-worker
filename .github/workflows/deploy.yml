name: Deploy Worker

on:
  workflow_dispatch:
  repository_dispatch:
  push:
    branches:
      - main

env:
  # 提前启用 Node 24 模式，消除 GitHub Actions 的弃用警告
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # 必须设为 22 或更高，以满足最新版 Wrangler 的强制要求
          node-version: '22'
      
      - name: Install dependencies
        run: npm install
      
      - name: Check and Create KV Namespace
        run: |
          KV_NAMESPACE="SUBLINK_KV"
          echo "Checking for KV namespace: $KV_NAMESPACE"
          
          # 使用 npx 确保调用正确版本的 wrangler，避免全局安装冲突
          if ! LIST_OUTPUT=$(npx wrangler kv namespace list 2>&1); then
            echo "Error getting KV namespace list: $LIST_OUTPUT"
            exit 1
          fi
          
          # 过滤掉杂讯，仅保留 JSON 部分
          CLEAN_JSON=$(echo "$LIST_OUTPUT" | grep -v "Cloudflare collects" | grep -v "telemetry")
          
          if ! echo "$CLEAN_JSON" | jq empty; then
            echo "Invalid JSON output from wrangler"
            exit 1
          fi
          
          KV_ID=$(echo "$CLEAN_JSON" | jq -r '.[] | select(.title == "sublink-worker-'$KV_NAMESPACE'") | .id')
          
          if [ -z "$KV_ID" ]; then
              echo "KV namespace $KV_NAMESPACE does not exist. Creating..."
              CREATE_OUTPUT=$(npx wrangler kv namespace create "sublink-worker-$KV_NAMESPACE" 2>&1)
              # 提取 ID 并确保只取第一个结果
              KV_ID=$(echo "$CREATE_OUTPUT" | grep -o '[0-9a-f]\{32\}' | head -n 1)
              
              if [ -z "$KV_ID" ]; then
                  echo "Failed to extract KV ID. Full output: $CREATE_OUTPUT"
                  exit 1
              fi
              echo "Created new KV ID: $KV_ID"
          else
              echo "Found existing KV ID: $KV_ID"
          fi
          
          # 写入环境变量供后续步骤使用
          echo "KV_ID=$KV_ID" >> $GITHUB_ENV
          
      - name: Update wrangler.toml
        run: |
          # 直接使用 sed 修改文件内容
          sed -i 's/id = "[^"]*"/id = "'$KV_ID'"/' wrangler.toml
          echo "Updated wrangler.toml:"
          cat wrangler.toml
          
      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
